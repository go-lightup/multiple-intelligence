<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e.star - 예약 결제</title>
    <style>
        /* 안전한 기본 폰트 설정 */
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0f0f0f;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: #888;
            margin-bottom: 20px;
        }

        .price-card {
            background: linear-gradient(145deg, #1e1e1e, #121212);
            border: 1px solid #333;
            border-radius: 30px;
            padding: 40px 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            margin-bottom: 30px;
        }

        .price-label {
            font-size: 1.1rem;
            color: #aaa;
            margin-bottom: 10px;
        }

        .price-value {
            font-size: 3.5rem;
            font-weight: 800;
            color: #fff;
            margin: 10px 0;
        }

        .price-value span {
            font-size: 1.5rem;
            font-weight: 400;
            color: #ffcc00;
            margin-left: 5px;
        }

        .benefit-list {
            list-style: none;
            padding: 0;
            margin: 25px 0;
            color: #ddd;
            font-size: 0.95rem;
            line-height: 1.8;
            text-align: left;
            display: inline-block;
        }

        .cta-button {
            background: #3366ff;
            color: white;
            border: none;
            padding: 18px 40px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            transition: 0.3s;
        }

        .cta-button:hover {
            background: #5585ff;
        }

        .cancel-link {
            display: inline-block;
            margin-top: 20px;
            color: #666;
            text-decoration: none;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">e.star Premium</div>

        <div class="price-card">
            <div class="price-label">무제한 소통 패스</div>
            <div class="price-value">3,000<span>원 / 1일</span></div>
            
            <ul class="benefit-list">
                <li>• 실시간 유튜버 1:1 예약권</li>
                <li>• 궁금증 질문 우선 답변권</li>
                <li>• 프라이빗 커뮤니티 입장</li>
            </ul>

            <button class="cta-button" onclick="location.href='processPayment.html'">
                지금 예약하기
            </button>
        </div>

        <a href="#" class="cancel-link" onclick="history.back()">뒤로 가기</a>
    </div>

</body>
</html>
