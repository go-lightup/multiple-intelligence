<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>선우의 놀이방 입장</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f7fafc; }
        .container { text-align: center; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 380px; }
        h1 { color: #2d3748; font-size: 2.2rem; margin-bottom: 10px; }
        .input-group { margin-bottom: 15px; text-align: left; }
        label { display: block; margin-bottom: 5px; color: #4a5568; font-weight: bold; }
        input { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; font-size: 1rem; }
        button { width: 100%; background-color: #48bb78; color: white; border: none; padding: 15px; border-radius: 10px; font-size: 1.1rem; cursor: pointer; margin-top: 10px; }
        button:disabled { background-color: #cbd5e0; cursor: not-allowed; }
        #message { margin-top: 20px; font-weight: bold; min-height: 3em; line-height: 1.5; }
        .error { color: #e53e3e; }
        .success { color: #38a169; }
    </style>
</head>
<body>

<div class="container">
    <h1>선우의 놀이방</h1>
    <p id="sub-title">입장 정보를 입력해 주세요</p>

    <form id="notifyForm" action="https://formsubmit.co/bigdaddy@naver.com" method="POST" style="display:none;">
        <input type="hidden" name="_subject" value="[선우의 놀이방] 새로운 입장 알림!">
        <input type="hidden" name="_captcha" value="false">
        <input type="text" name="visitor_name" id="hidden_name">
        <input type="text" name="status" value="정식 비밀번호로 입장 성공">
    </form>

    <div class="input-group">
        <label>이름</label>
        <input type="text" id="nameInput" placeholder="이름을 입력하세요">
    </div>
    
    <div class="input-group">
        <label>비밀번호</label>
        <input type="password" id="pwInput" placeholder="******">
    </div>

    <button id="entryBtn" onclick="handleEntry()">입장하기</button>
    <div id="message"></div>
</div>

<script>
    const CORRECT_PW = "tam";
    let failCount = 0;

    function handleEntry() {
        const name = document.getElementById('nameInput').value.trim();
        const pw = document.getElementById('pwInput').value;
        const message = document.getElementById('message');

        if (!name) {
            message.innerHTML = "이름을 먼저 입력해 주세요.";
            message.className = "error";
            return;
        }

        if (failCount >= 3) return;

        if (pw === CORRECT_PW) {
            // 1. 성공 메시지 표시
            message.innerHTML = `🎉 반가워요, ${name}님!<br>놀이방에 입장하세요.`;
            message.className = "success";
            
            // 2. 알림 메일 발송 (폼 제출)
            document.getElementById('hidden_name').value = name;
            document.getElementById('notifyForm').submit();

            // 3. 입력창 비활성화
            document.getElementById('nameInput').disabled = true;
            document.getElementById('pwInput').disabled = true;
            document.getElementById('entryBtn').disabled = true;
        } else {
            // 실패 처리
            failCount++;
            document.getElementById('pwInput').value = "";
            if (failCount >= 3) {
                message.innerHTML = "🚫 입장을 할 수 없습니다.<br>(비밀번호 3회 오류)";
                message.className = "error";
                document.getElementById('entryBtn').disabled = true;
            } else {
                message.innerHTML = `다시 시도해 주세요. (${failCount}/3)<br>3회 이상 틀리면 입장이 제한됩니다.`;
                message.className = "error";
            }
        }
    }
</script>

</body>
</html>
