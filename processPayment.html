<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e.star - 안전 결제</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', sans-serif;
            background-color: #f4f7f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .payment-container {
            background: white;
            width: 90%;
            max-width: 400px;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
        }

        .header {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 25px;
            color: #1a1a1a;
        }

        .price-info {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
        }

        .price-info span {
            display: block;
            font-size: 0.9rem;
            color: #666;
        }

        .price-info strong {
            font-size: 1.8rem;
            color: #3366ff;
        }

        .button-wrapper {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* 결제 버튼 공통 스타일 */
        .pay-btn {
            padding: 18px;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }

        .pay-btn:active {
            transform: scale(0.98);
            opacity: 0.9;
        }

        /* 파란색 버튼 (신용카드/간편결제 등) */
        .btn-blue {
            background-color: #3366ff;
            box-shadow: 0 5px 15px rgba(51, 102, 255, 0.3);
        }

        /* 빨간색 버튼 (다른 결제 수단) */
        .btn-red {
            background-color: #ff4d4d;
            box-shadow: 0 5px 15px rgba(255, 77, 77, 0.3);
        }

        .notice {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #999;
        }
    </style>
</head>
<body>

    <div class="payment-container" id="paymentBox">
        <div class="header">결제 수단 선택</div>

        <div class="price-info">
            <span>e.star 1일 이용권</span>
            <strong>3,000원</strong>
        </div>

        <div class="button-wrapper">
            <button class="pay-btn btn-blue" onclick="processPayment('파란색')">
                파란색 버튼 결제
            </button>
            <button class="pay-btn btn-red" onclick="processPayment('빨간색')">
                빨간색 버튼 결제
            </button>
        </div>

        <div class="notice">
            버튼을 클릭하면 즉시 결제가 진행됩니다.
        </div>
    </div>

    <script>
        function processPayment(color) {
            // 결제 진행 중임을 알리는 간단한 시뮬레이션
            const container = document.getElementById('paymentBox');
            container.innerHTML = `
                <div style="padding: 40px 0;">
                    <h2 style="color: #3366ff;">결제 진행 중...</h2>
                    <p>${color} 버튼을 선택하셨습니다.</p>
                </div>
            `;

            // 1.5초 후 결제 완료 화면으로 전환
            setTimeout(() => {
                container.innerHTML = `
                    <div style="padding: 40px 0;">
                        <h2 style="color: #28a745;">✅ 결제 완료</h2>
                        <p>3,000원이 자동 결제되었습니다.</p>
                        <p style="font-size: 0.9rem; color: #666;">잠시 후 메인 화면으로 이동합니다.</p>
                        <button onclick="location.reload()" style="margin-top:20px; padding:10px 20px; border-radius:10px; border:1px solid #ddd; background:white; cursor:pointer;">처음으로</button>
                    </div>
                `;
            }, 1500);
        }
    </script>

</body>
</html>
