<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Email App</title>
    <style>
        /* 기본 배경 설정 */
        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 1. 상단 바 (이메일 앱 느낌) */
        .top-bar {
            width: 100%;
            height: 60px;
            background: #f1f3f4;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 0 20px;
            box-sizing: border-box;
            border-bottom: 1px solid #dee2e6;
        }

        /* 설정 아이콘 모양 버튼 */
        .settings-trigger {
            width: 35px;
            height: 35px;
            cursor: pointer;
            background: #5f6368;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
        }

        /* 2. 중앙 컨텐츠 영역 */
        .container {
            margin-top: 100px;
            text-align: center;
            width: 100%;
        }

        /* APPLICATIONS 메뉴 (처음엔 숨김) */
        #app-menu {
            display: none; 
            border: 2px solid #333;
            padding: 40px;
            border-radius: 20px;
            width: 300px;
            margin: 0 auto;
            background: #fff;
        }

        .menu-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 30px;
            color: #222;
        }

        /* 3. QR코드 디자인 */
        .qr-box {
            width: 150px;
            height: 150px;
            background-color: #000;
            margin: 0 auto;
            cursor: pointer;
            padding: 10px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
        }
        .qr-box div { background: white; width: 100%; height: 100%; }

        /* 4. 최종 사과 화면 (처음엔 숨김) */
        #apple-display {
            display: none;
            font-size: 50px;
            color: #ff3b30;
        }

        .html-code-block {
            background: #272822;
            color: #f8f8f2;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 14px;
            text-align: left;
            margin-top: 20px;
            overflow-x: auto;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="settings-trigger" onclick="openMenu()">⚙</div>
    </div>

    <div class="container">
        <div id="start-guide">오른쪽 위 설정 버튼을 클릭하세요.</div>

        <div id="app-menu">
            <div class="menu-title">APPLICATIONS</div>
            <div class="qr-box" onclick="showResult()">
                <div></div><div style="background:black"></div><div></div>
                <div style="background:black"></div><div></div><div style="background:black"></div>
                <div></div><div style="background:black"></div><div></div>
            </div>
            <p>인증을 위해 위 QR을 클릭하세요</p>
        </div>

        <div id="apple-display">
            <div>🍎 APPLE</div>
            <div class="html-code-block">
                &lt;div class="apple-logo"&gt;<br>
                &nbsp;&nbsp;&lt;span&gt;Apple Logic Activated&lt;/span&gt;<br>
                &lt;/div&gt;
            </div>
            <button onclick="location.reload()" style="margin-top:20px;">다시 시작</button>
        </div>
    </div>

    <script>
        // 1. 설정 클릭 시 실행
        function openMenu() {
            document.getElementById('start-guide').style.display = 'none';
            document.getElementById('app-menu').style.display = 'block';
        }

        // 2. QR 클릭 시 실행
        function showResult() {
            document.getElementById('app-menu').style.display = 'none';
            document.getElementById('apple-display').style.display = 'block';
        }
    </script>
</body>
</html>
