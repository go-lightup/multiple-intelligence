<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>선우의 놀이방</title>
    <style>
        body {
            font-family: 'Pretendard', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f4f8;
        }
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 350px;
        }
        h1 {
            color: #2d3748;
            font-size: 2.5rem;
            margin-bottom: 20px;
        }
        p {
            color: #4a5568;
            margin-bottom: 15px;
        }
        input[type="password"] {
            width: 80%;
            padding: 12px;
            font-size: 1.2rem;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            margin-bottom: 20px;
            outline: none;
            text-align: center;
        }
        button {
            background-color: #4299e1;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #3182ce;
        }
        button:disabled {
            background-color: #cbd5e0;
            cursor: not-allowed;
        }
        #message {
            margin-top: 20px;
            font-weight: bold;
            min-height: 1.5em;
        }
        .success { color: #38a169; }
        .error { color: #e53e3e; }
        .locked { color: #718096; }
    </style>
</head>
<body>

<div class="container">
    <h1>선우의 놀이방</h1>
    <p>비밀번호를 입력하세요</p>
    
    <input type="password" id="pwInput" placeholder="******" onkeypress="handleKeyPress(event)">
    <br>
    <button id="submitBtn" onclick="checkPassword()">입장하기</button>
    
    <div id="message"></div>
</div>

<script>
    const CORRECT_PW = "tam"; // 설정하신 비밀번호
    let failCount = 0;
    const MAX_FAILS = 3;

    function handleKeyPress(event) {
        if (event.key === "Enter") {
            checkPassword();
        }
    }

    function checkPassword() {
        const input = document.getElementById('pwInput');
        const message = document.getElementById('message');
        const btn = document.getElementById('submitBtn');

        if (failCount >= MAX_FAILS) return;

        if (input.value === CORRECT_PW) {
            // 성공 시
            message.innerHTML = "🎉 놀이방에 입장하세요.";
            message.className = "success";
            input.disabled = true;
            btn.disabled = true;
            // 추가 액션: 다른 페이지로 이동하거나 연동할 수 있습니다.
        } else {
            // 실패 시
            failCount++;
            input.value = ""; // 입력값 초기화
            
            if (failCount >= MAX_FAILS) {
                message.innerHTML = "🚫 입장을 할 수 없습니다.";
                message.className = "error";
                input.disabled = true;
                btn.disabled = true;
            } else {
                message.innerHTML = `다시 시도해 주세요.<br>(${failCount}/${MAX_FAILS}회 실패) 3회 이상 틀리면 입장이 제한됩니다.`;
                message.className = "error";
            }
        }
    }
</script>

</body>
</html>
