<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>개미 사육장</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #1a1a2e 0%, #000 100%);
            color: white;
            font-family: 'Apple SD Gothic Neo', sans-serif;
            overflow: hidden;
            text-align: center;
        }

        /* 디즈니+ 스타일 인트로 */
        #intro {
            font-size: 3rem;
            letter-spacing: 8px;
            font-weight: bold;
            background: linear-gradient(to right, #fff, #4ebfff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: disneyZoom 3s ease-in-out forwards;
        }

        .hidden { display: none !important; }

        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }

        input {
            display: block;
            width: 200px;
            padding: 10px;
            margin: 10px auto;
            border-radius: 5px;
            border: none;
            text-align: center;
            font-size: 1.1rem;
        }

        button {
            padding: 10px 30px;
            background: #0072d2;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
        }

        #point-display { color: #ffd700; font-weight: bold; margin-bottom: 20px; }
        #timer { color: #ff4d4d; font-weight: bold; margin-top: 10px; }

        @keyframes disneyZoom {
            0% { transform: scale(0.5); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: scale(1.1); opacity: 0; visibility: hidden; }
        }
    </style>
</head>
<body>

    <div id="intro">개미 사육장</div>

    <div id="login-screen" class="container hidden">
        <h2>보안 시스템</h2>
        <div id="point-display">보유 포인트: <span id="points">0</span></div>
        <input type="password" id="pw1" placeholder="첫 번째 비밀번호">
        <input type="password" id="pw2" placeholder="두 번째 비밀번호">
        <button id="check-btn" onclick="verify()">확인</button>
        <div id="timer"></div>
    </div>

    <div id="entry-screen" class="container hidden">
        <h1 style="color:#00ff88">비밀번호 일치!</h1>
        <p>포인트가 <span style="color:#ffd700">4+</span> 충전되었습니다.</p>
        <p>입장하려면 2포인트가 필요합니다.</p>
        <button onclick="usePointAndEnter()">2포인트 내고 입장하기</button>
    </div>

    <div id="final-screen" class="container hidden">
        <h1 style="font-size: 3rem;">입장하시오.</h1>
        <p>🐜 개미 사육장에 접속되었습니다.</p>
    </div>

    <script>
        let points = 0;
        let isLocked = false;

        // 인트로 후 로그인창 등장
        setTimeout(() => {
            document.getElementById('intro').classList.add('hidden');
            document.getElementById('login-screen').classList.remove('hidden');
        }, 3000);

        function verify() {
            if (isLocked) return;

            const p1 = document.getElementById('pw1').value;
            const p2 = document.getElementById('pw2').value;
            const timerMsg = document.getElementById('timer');

            if (p1 === '2288' && p2 === '1987') {
                // 성공 로직
                points += 4;
                updatePoints();
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('entry-screen').classList.remove('hidden');
            } else {
                // 실패 로직
                points -= 2;
                updatePoints();
                lockSystem(120); // 120초(2분) 락
            }
        }

        function updatePoints() {
            document.getElementById('points').innerText = points;
        }

        function lockSystem(seconds) {
            isLocked = true;
            const btn = document.getElementById('check-btn');
            const timerMsg = document.getElementById('timer');
            btn.disabled = true;

            let remaining = seconds;
            const interval = setInterval(() => {
                const min = Math.floor(remaining / 60);
                const sec = remaining % 60;
                timerMsg.innerText = `틀렸습니다! -2포인트. 락 해제까지: ${min}분 ${sec}초`;
                
                if (remaining <= 0) {
                    clearInterval(interval);
                    isLocked = false;
                    btn.disabled = false;
                    timerMsg.innerText = "";
                }
                remaining--;
            }, 1000);
        }

        function usePointAndEnter() {
            if (points >= 2) {
                points -= 2;
                updatePoints();
                document.getElementById('entry-screen').classList.add('hidden');
                document.getElementById('final-screen').classList.remove('hidden');
            } else {
                alert("포인트가 부족합니다!");
            }
        }
    </script>
</body>
</html>
